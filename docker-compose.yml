version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: outfittr-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: outfittr
      POSTGRES_PASSWORD: outfittr_local
      POSTGRES_DB: outfittr
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U outfittr"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
